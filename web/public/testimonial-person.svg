<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" rx="24" fill="url(#tbg)"/>
  <!-- Person portrait -->
  <circle cx="200" cy="200" r="80" fill="#dbeafe"/>
  <circle cx="200" cy="175" r="35" fill="#fbbf24"/>
  <ellipse cx="200" cy="255" rx="45" ry="35" fill="#bfdbfe"/>
  <!-- Smile -->
  <path d="M188 180 Q200 192 212 180" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="190" cy="168" r="3" fill="#1e293b"/>
  <circle cx="210" cy="168" r="3" fill="#1e293b"/>
  <!-- Hair -->
  <path d="M165 165 Q170 130 200 125 Q230 130 235 165" fill="#92400e" opacity="0.7"/>
  <!-- Stethoscope icon at bottom -->
  <circle cx="200" cy="380" r="30" fill="#e0f2fe"/>
  <path d="M188 375 Q186 395 200 400 Q214 395 212 375" stroke="#0ea5e9" stroke-width="3" fill="none"/>
  <circle cx="200" cy="402" r="4" fill="#0ea5e9"/>
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="6" fill="#00DBDE" opacity="0.2"/>
  <circle cx="300" cy="120" r="4" fill="#FC00FF" opacity="0.2"/>
  <circle cx="320" cy="400" r="5" fill="#00DBDE" opacity="0.15"/>
  <circle cx="80" cy="350" r="3" fill="#a855f7" opacity="0.2"/>
  <!-- Quote marks -->
  <text x="120" y="330" font-size="60" fill="#00DBDE" opacity="0.15" font-family="Georgia, serif">"</text>
  <text x="260" y="330" font-size="60" fill="#FC00FF" opacity="0.15" font-family="Georgia, serif">"</text>
</svg>
