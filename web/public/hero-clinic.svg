<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#f3e5f5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00DBDE"/>
      <stop offset="100%" stop-color="#FC00FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" rx="24" fill="url(#bg)"/>
  <!-- Building -->
  <rect x="180" y="180" width="440" height="300" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="180" y="180" width="440" height="4" rx="2" fill="url(#accent)"/>
  <!-- Cross -->
  <rect x="370" y="120" width="60" height="80" rx="8" fill="#ffffff" stroke="#00DBDE" stroke-width="2"/>
  <rect x="388" y="132" width="24" height="56" rx="3" fill="#00DBDE"/>
  <rect x="381" y="148" width="38" height="24" rx="3" fill="#00DBDE"/>
  <!-- Windows row 1 -->
  <rect x="220" y="220" width="60" height="50" rx="8" fill="#e0f2fe"/>
  <rect x="310" y="220" width="60" height="50" rx="8" fill="#e0f2fe"/>
  <rect x="430" y="220" width="60" height="50" rx="8" fill="#e0f2fe"/>
  <rect x="520" y="220" width="60" height="50" rx="8" fill="#e0f2fe"/>
  <!-- Windows row 2 -->
  <rect x="220" y="300" width="60" height="50" rx="8" fill="#ede9fe"/>
  <rect x="310" y="300" width="60" height="50" rx="8" fill="#ede9fe"/>
  <rect x="430" y="300" width="60" height="50" rx="8" fill="#ede9fe"/>
  <rect x="520" y="300" width="60" height="50" rx="8" fill="#ede9fe"/>
  <!-- Door -->
  <rect x="360" y="390" width="80" height="90" rx="12" fill="#00DBDE" opacity="0.2"/>
  <rect x="370" y="400" width="60" height="80" rx="8" fill="#00DBDE" opacity="0.4"/>
  <circle cx="420" cy="440" r="4" fill="#ffffff"/>
  <!-- Person 1: Doctor (left) -->
  <circle cx="280" cy="430" r="22" fill="#f0abfc"/>
  <rect x="262" y="452" width="36" height="50" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="268" y="456" width="24" height="6" rx="2" fill="#00DBDE" opacity="0.5"/>
  <!-- Stethoscope -->
  <path d="M270 470 Q265 485 275 490 Q285 485 280 470" stroke="#64748b" stroke-width="2" fill="none"/>
  <!-- Person 2: Nurse (right) -->
  <circle cx="520" cy="430" r="22" fill="#93c5fd"/>
  <rect x="502" y="452" width="36" height="50" rx="10" fill="#dbeafe"/>
  <rect x="508" y="456" width="24" height="6" rx="2" fill="#60a5fa"/>
  <!-- Clipboard -->
  <rect x="530" y="460" width="16" height="22" rx="3" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="533" y="468" width="10" height="2" rx="1" fill="#cbd5e1"/>
  <rect x="533" y="473" width="7" height="2" rx="1" fill="#cbd5e1"/>
  <!-- Person 3: Patient (center-right) -->
  <circle cx="470" cy="440" r="18" fill="#fbbf24"/>
  <rect x="456" y="458" width="28" height="42" rx="8" fill="#fef3c7"/>
  <!-- Heart icon floating -->
  <g transform="translate(340, 150)">
    <circle cx="0" cy="0" r="16" fill="#fce4ec"/>
    <path d="M0 6 L-5 1 A3.5 3.5 0 0 1 0 -3 A3.5 3.5 0 0 1 5 1 Z" fill="#e91e63" transform="scale(1.2)"/>
  </g>
  <!-- Plus signs floating -->
  <g opacity="0.3">
    <text x="160" y="250" font-size="24" fill="#00DBDE" font-weight="bold">+</text>
    <text x="640" y="210" font-size="20" fill="#FC00FF" font-weight="bold">+</text>
    <text x="650" y="380" font-size="16" fill="#00DBDE" font-weight="bold">+</text>
    <text x="150" y="400" font-size="18" fill="#a855f7" font-weight="bold">+</text>
  </g>
  <!-- Trees -->
  <circle cx="130" cy="440" r="30" fill="#86efac" opacity="0.6"/>
  <rect x="127" y="460" width="6" height="20" rx="2" fill="#65a30d" opacity="0.5"/>
  <circle cx="670" cy="430" r="35" fill="#86efac" opacity="0.5"/>
  <rect x="667" y="455" width="6" height="25" rx="2" fill="#65a30d" opacity="0.5"/>
  <!-- Ground -->
  <rect x="100" y="480" width="600" height="8" rx="4" fill="#e2e8f0"/>
  <!-- Text badge -->
  <rect x="250" y="520" width="300" height="36" rx="18" fill="url(#accent)" opacity="0.1"/>
  <text x="400" y="543" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#7c3aed">Barangay Iponan Health Clinic</text>
</svg>
